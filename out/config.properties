# Sensitive configuration for APPJeauge (do not commit real secrets)
# Create/modify this file outside version control.

# --- SQLite paths ---
# Tank status DB used by ConnextionFTP.selectGeauge()
SQLITE_TANK_STATUS_DB=C://sqlite/tankstatusFiles/TankStatus.db3

# Journal DB folder used by ConnextionFTP.selectAlljournal()
# Expected naming: <yyyyMMdd>.db3 inside this folder
SQLITE_JOURNAL_DB_DIR=C://sqlite/db

# --- Alert thresholds ---
# Minimum quantities by displayed tank number.
# 1 = 1-SSP15M3, 2 = 2-SSP15M3, 3 = 3-VPower-1,
# 4 = 4-GOSS-15M, 5 = 5-Gasoil-1, 6 = 6-Gasoil-1
ALERT_TANK_1_MIN=7000
ALERT_TANK_2_MIN=3000
ALERT_TANK_3_MIN=3000
ALERT_TANK_4_MIN=5000
ALERT_TANK_5_MIN=3000
ALERT_TANK_6_MIN=3000

# --- Tank capacities ---
# Used by progress bars, dashboard percentages and the settings screen.
TANK_1_CAPACITY=15447
TANK_2_CAPACITY=15400
TANK_3_CAPACITY=15409
TANK_4_CAPACITY=15446
TANK_5_CAPACITY=15447
TANK_6_CAPACITY=15401

# --- Audio ---
ALARM_WAV_FILE=resource:/shell/sijoumi/etatcuve/items/alarme.wav

# --- Logs ---
# Collects console output, errors and uncaught exceptions.
LOG_FILE=logs/appjeauge.log

# --- FTP (replace with real values in local config) ---
FTP_SERVER=192.168.242.1
FTP_PORT=21
FTP_USERNAME=SUPERVISOR
FTP_PASSWORD=79E0BB075

# Paths on FTP server (used by ConnextionFTP)
FTP_JOURNAL_DIR=/JOURNAL/
FTP_TANKSTATUS_DIR=/PRO_TMS/initial/
FTP_TANKSTATUS_FILENAME=TankStatus.db3

